<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioDesk · Painel</title>
<style>
:root {
  --teal: #1db89a;
  --teal-dark: #14856f;
  --orange: #e05a1e;
  --bg: #080810;
  --bg2: #0e0e18;
  --bg3: #141420;
  --bg4: #1a1a28;
  --border: #252535;
  --border2: #2e2e45;
  --text: #eeeef8;
  --text-dim: #5a5a78;
  --text-mid: #9898b8;
  --green: #00e676;
  --red: #ff4455;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}

body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(29,184,154,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,184,154,0.02) 1px, transparent 1px);
  background-size: 28px 28px; pointer-events:none; z-index:0;
}

/* LOGIN */
.login-wrap {
  position: fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index: 100;
}

.login-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 16px; padding: 36px 32px; width: 340px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}

.login-logo {
  width: 60px; height: 60px; border-radius: 14px;
  background: var(--bg3); margin: 0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  font-size: 28px;
  border: 1px solid var(--border2);
}

.login-title {
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  color: var(--text); margin-bottom: 4px;
}

.login-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 24px; }

.login-input {
  width: 100%; height: 42px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 0 16px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s; margin-bottom: 12px;
}

.login-input:focus { border-color: var(--teal); }
.login-input::placeholder { color: var(--text-dim); }

.login-btn {
  width: 100%; height: 42px; border-radius: 10px;
  border: 1px solid var(--teal); background: var(--teal-dark);
  color: white; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.login-btn:hover { background: var(--teal); }

.login-error {
  color: var(--red); font-size: 12px; margin-top: 8px; display:none;
}

/* DASHBOARD */
#dashboard { display:none; position:relative; z-index:1; }

.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10;
}

.topbar-left { display:flex; align-items:center; gap: 12px; }
.topbar-logo {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--bg3); display:flex; align-items:center;
  justify-content:center; font-size: 18px;
  border: 1px solid var(--border2);
}

.topbar-title {
  font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--text);
}
.topbar-sub { font-size: 10px; color: var(--text-dim); }

.topbar-right { display:flex; align-items:center; gap: 12px; }

.last-update {
  font-size: 11px; color: var(--text-dim);
}

.refresh-btn {
  height: 32px; padding: 0 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text-mid); font-size: 12px; cursor: pointer;
  transition: all 0.15s; display:flex; align-items:center; gap:5px;
}
.refresh-btn:hover { border-color: var(--teal); color: var(--teal); }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.logout-btn {
  height: 32px; padding: 0 14px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* STATS */
.stats-bar {
  display:flex; gap: 12px; padding: 16px 24px;
  flex-wrap: wrap;
}

.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; flex:1; min-width: 150px;
}

.stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.teal { color: var(--teal); }

/* FILTROS */
.filters {
  padding: 0 24px 16px;
  display:flex; align-items:center; gap: 10px; flex-wrap:wrap;
}

.filter-btn {
  height: 30px; padding: 0 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-size: 11px; cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { border-color: var(--teal); background: rgba(29,184,154,0.1); color: var(--teal); }
.filter-btn:hover { border-color: var(--border2); color: var(--text); }

.search-input {
  height: 30px; padding: 0 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: 11px; outline: none; width: 200px;
  transition: border-color 0.15s; margin-left: auto;
}
.search-input:focus { border-color: var(--teal); }
.search-input::placeholder { color: var(--text-dim); }

/* GRID */
.servers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px; padding: 0 24px 24px;
}

.server-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
  transition: all 0.2s; position:relative; overflow:hidden;
}

.server-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  border-radius:14px 14px 0 0;
  background: linear-gradient(90deg, var(--teal-dark), transparent);
  opacity:0; transition:opacity 0.2s;
}

.server-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.server-card:hover::before { opacity:1; }
.server-card.online { border-left: 2px solid var(--green); }
.server-card.offline { border-left: 2px solid #333; }

.card-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px;
}

.card-status {
  display:flex; align-items:center; gap: 6px;
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px;
}
.card-status.online { background: rgba(0,230,118,0.1); color: var(--green); }
.card-status.offline { background: rgba(100,100,100,0.1); color: var(--text-dim); }

.status-dot-small {
  width: 6px; height: 6px; border-radius: 50%;
}
.online .status-dot-small { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
.offline .status-dot-small { background: #555; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.card-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  margin-bottom: 4px; line-height: 1.3;
}

.card-ip {
  font-family: monospace; font-size: 12px; color: var(--teal);
  margin-bottom: 10px;
}

.card-meta {
  display:flex; flex-direction:column; gap: 4px;
  border-top: 1px solid var(--border); padding-top: 10px;
}

.card-meta-row {
  display:flex; justify-content:space-between; align-items:center;
}

.meta-label { font-size: 10px; color: var(--text-dim); }
.meta-value { font-size: 11px; color: var(--text-mid); }
.meta-value.online { color: var(--green); }

.empty-state {
  grid-column: 1/-1; text-align:center;
  padding: 48px; color: var(--text-dim); font-size: 14px;
}

/* LOADING */
.loading {
  display:flex; align-items:center; justify-content:center;
  padding: 48px; color: var(--text-dim); gap: 10px;
}

.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border2);
  border-top-color: var(--teal); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .stats-bar { padding: 12px 16px; }
  .servers-grid { padding: 0 16px 16px; grid-template-columns: 1fr; }
  .filters { padding: 0 16px 12px; }
  .topbar { padding: 10px 16px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">🖥</div>
    <div class="login-title">BIODESK</div>
    <div class="login-sub">Painel de Monitoramento · Biomessenger</div>
    <input class="login-input" type="password" id="pwd-input"
      placeholder="Senha de acesso"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🖥</div>
      <div>
        <div class="topbar-title">BIODESK</div>
        <div class="topbar-sub">Painel de Monitoramento · Biomessenger</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="last-update" id="last-update">—</span>
      <button class="refresh-btn" onclick="loadData()" id="refresh-btn">↻ Atualizar</button>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total de Servidores</div>
      <div class="stat-value teal" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Online Agora</div>
      <div class="stat-value green" id="stat-online">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Offline</div>
      <div class="stat-value red" id="stat-offline">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Última Atualização</div>
      <div class="stat-value" id="stat-update" style="font-size:16px">—</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('online', this)">Online</button>
    <button class="filter-btn" onclick="setFilter('offline', this)">Offline</button>
    <input class="search-input" type="text" id="search" placeholder="🔍  Buscar servidor..." oninput="renderCards()">
  </div>

  <div class="servers-grid" id="grid">
    <div class="loading"><div class="spinner"></div> Carregando servidores...</div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const SENHA = 'biom@@2025'
const TOKEN = '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'
const REPO  = 'tecnologia-biomessenger/biodesk-servers'
const SERVERS_API = `https://api.github.com/repos/${REPO}/contents/servers.json`
const STATUS_API  = `https://api.github.com/repos/${REPO}/contents/status.json`

let allServers = []
let statusMap  = {}
let currentFilter = 'all'
let refreshTimer = null

// ── Auth ──────────────────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('pwd-input').value
  if (pwd === SENHA) {
    sessionStorage.setItem('biodesk_auth', '1')
    document.getElementById('login-wrap').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    loadData()
    startAutoRefresh()
  } else {
    document.getElementById('login-error').style.display = 'block'
    document.getElementById('pwd-input').value = ''
  }
}

function doLogout() {
  sessionStorage.removeItem('biodesk_auth')
  location.reload()
}

// Verificar se já está logado
if (sessionStorage.getItem('biodesk_auth') === '1') {
  document.getElementById('login-wrap').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  loadData()
  startAutoRefresh()
}

// ── GitHub API ────────────────────────────────────────────────
async function ghGet(url) {
  const r = await fetch(url, {
    headers: {
      'Authorization': `token ${TOKEN}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  })
  return r.json()
}

function b64decode(str) {
  return JSON.parse(atob(str.replace(/\n/g, '')))
}

// ── Carregar dados ────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn')
  btn.textContent = '↻ Atualizando...'
  btn.style.opacity = '0.6'

  try {
    const [serversMeta, statusMeta] = await Promise.all([
      ghGet(SERVERS_API),
      ghGet(STATUS_API)
    ])

    const serversData = b64decode(serversMeta.content)
    const statusData  = b64decode(statusMeta.content)

    allServers = serversData.servidores || []

    // Mapear status por IP
    statusMap = {}
    for (const s of (statusData.servidores || [])) {
      statusMap[s.ip] = s
    }

    // Considerar offline se último ping > 10 minutos
    const now = Date.now()
    for (const ip in statusMap) {
      const st = statusMap[ip]
      if (st.ultimo_ping) {
        const diff = now - new Date(st.ultimo_ping).getTime()
        if (diff > 10 * 60 * 1000) st.online = false
      }
    }

    updateStats()
    renderCards()

    const time = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
    document.getElementById('last-update').textContent = `Atualizado às ${time}`
  } catch(e) {
    console.error('Erro ao carregar dados:', e)
  }

  btn.textContent = '↻ Atualizar'
  btn.style.opacity = '1'
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  const total   = allServers.length
  const onlineList = allServers.filter(s => statusMap[s.ip]?.online === true)
  const online  = onlineList.length
  const offline = total - online

  document.getElementById('stat-total').textContent   = total
  document.getElementById('stat-online').textContent  = online
  document.getElementById('stat-offline').textContent = offline

  // Último ping mais recente
  let lastPing = null
  for (const ip in statusMap) {
    const t = new Date(statusMap[ip].ultimo_ping)
    if (!lastPing || t > lastPing) lastPing = t
  }
  document.getElementById('stat-update').textContent = lastPing
    ? lastPing.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
    : '—'
}

// ── Filtros ───────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderCards()
}

// ── Renderizar cards ──────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('grid')
  const search = document.getElementById('search').value.toLowerCase()

  let servers = allServers.filter(s => {
    const st = statusMap[s.ip] || {}
    const isOnline = st.online === true

    if (currentFilter === 'online' && !isOnline) return false
    if (currentFilter === 'offline' && isOnline) return false
    if (search && !s.nome.toLowerCase().includes(search) && !(s.ip || '').includes(search)) return false
    return true
  })

  if (servers.length === 0) {
    grid.innerHTML = '<div class="empty-state">Nenhum servidor encontrado</div>'
    return
  }

  // Ordenar: online primeiro
  servers.sort((a, b) => {
    const aOnline = statusMap[a.ip]?.online === true
    const bOnline = statusMap[b.ip]?.online === true
    return (bOnline ? 1 : 0) - (aOnline ? 1 : 0)
  })

  grid.innerHTML = servers.map(srv => {
    const st = statusMap[srv.ip] || {}
    const isOnline = st.online === true
    const lastPing = st.ultimo_ping
      ? new Date(st.ultimo_ping).toLocaleString('pt-BR', {
          day:'2-digit', month:'2-digit',
          hour:'2-digit', minute:'2-digit'
        })
      : 'Nunca'
    const version = st.versao || '—'
    const hostname = st.hostname || '—'

    return `
    <div class="server-card ${isOnline ? 'online' : 'offline'}">
      <div class="card-header">
        <div class="card-name">${srv.nome}</div>
        <div class="card-status ${isOnline ? 'online' : 'offline'}">
          <div class="status-dot-small"></div>
          ${isOnline ? 'Online' : 'Offline'}
        </div>
      </div>
      <div class="card-ip">${srv.ip || '—'}</div>
      <div class="card-meta">
        <div class="card-meta-row">
          <span class="meta-label">Computador</span>
          <span class="meta-value">${hostname}</span>
        </div>
        <div class="card-meta-row">
          <span class="meta-label">Último ping</span>
          <span class="meta-value ${isOnline ? 'online' : ''}">${lastPing}</span>
        </div>
        <div class="card-meta-row">
          <span class="meta-label">Versão BioDesk</span>
          <span class="meta-value">v${version}</span>
        </div>
        <div class="card-meta-row">
          <span class="meta-label">Rede</span>
          <span class="meta-value">${srv.rede === 'publica' ? '🌐 Pública' : '🔒 Privada'}</span>
        </div>
      </div>
    </div>
  `}).join('')
}

// ── Auto-refresh a cada 2 minutos ─────────────────────────────
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer)
  refreshTimer = setInterval(loadData, 2 * 60 * 1000)
}
</script>
</body>
</html>
